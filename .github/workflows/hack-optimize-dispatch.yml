name: Hack Optimize Dispatch

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Quelle des Slugs"
        required: true
        default: "next"
        type: choice
        options:
          - next
          - slug
      slug:
        description: "Nur bei mode=slug: konkreter Hack-Slug (z. B. abruf-ueben)"
        required: false
        default: ""
        type: string
      commit:
        description: "Soll die Automation commit+push ausfuehren?"
        required: true
        default: true
        type: boolean
      dry_run:
        description: "Nur pruefen, nichts committen"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Preconditions
        shell: bash
        env:
          AUTOMATION_WEBHOOK_URL: ${{ secrets.AUTOMATION_WEBHOOK_URL }}
          AUTOMATION_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${AUTOMATION_WEBHOOK_URL:-}" ]]; then
            echo "❌ Secret AUTOMATION_WEBHOOK_URL fehlt." >> "$GITHUB_STEP_SUMMARY"
            exit 2
          fi
          if [[ -z "${AUTOMATION_TOKEN:-}" ]]; then
            echo "❌ Secret AUTOMATION_TOKEN fehlt." >> "$GITHUB_STEP_SUMMARY"
            exit 2
          fi

      - name: Dispatch to automation bridge
        id: dispatch
        shell: bash
        env:
          AUTOMATION_WEBHOOK_URL: ${{ secrets.AUTOMATION_WEBHOOK_URL }}
          AUTOMATION_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_SLUG: ${{ inputs.slug }}
          INPUT_COMMIT: ${{ inputs.commit }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          TRIGGERED_BY: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          payload=$(python -c "import json,os; print(json.dumps({'repo':os.environ['REPO'],'branch':os.environ['BRANCH'],'triggeredBy':os.environ['TRIGGERED_BY'],'runUrl':os.environ['RUN_URL'],'mode':os.environ['INPUT_MODE'],'slug':os.environ['INPUT_SLUG'],'commit':os.environ['INPUT_COMMIT']=='true','dryRun':os.environ['INPUT_DRY_RUN']=='true'},separators=(',',':')))")
          echo "Dispatch payload: ${payload}"

          http_status=$(curl -sS -o response.json -w "%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 2 \
            --retry-delay 1 \
            -X POST "${AUTOMATION_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -H "X-Automation-Token: ${AUTOMATION_TOKEN}" \
            --data "${payload}")

          echo "HTTP status: ${http_status}"
          if [[ "${http_status}" -lt 200 || "${http_status}" -ge 300 ]]; then
            echo "❌ Dispatch fehlgeschlagen (HTTP ${http_status})." >> "$GITHUB_STEP_SUMMARY"
            echo "```json" >> "$GITHUB_STEP_SUMMARY"
            cat response.json >> "$GITHUB_STEP_SUMMARY" || true
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "```" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          out = Path(os.environ["GITHUB_OUTPUT"])
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          raw = Path("response.json").read_text(encoding="utf-8", errors="replace").strip()

          if not raw:
              with summary.open("a", encoding="utf-8") as f:
                  f.write("❌ Bridge-Antwort ist leer.\n")
              raise SystemExit(1)

          try:
              data = json.loads(raw)
          except json.JSONDecodeError as exc:
              with summary.open("a", encoding="utf-8") as f:
                  f.write("❌ Bridge-Antwort ist kein gueltiges JSON.\n\n")
                  f.write(f"Fehler: {exc}\n\n")
                  f.write("```text\n")
                  f.write(raw[:1200] + "\n")
                  f.write("```\n")
              raise SystemExit(1)

          if not isinstance(data, dict):
              with summary.open("a", encoding="utf-8") as f:
                  f.write("❌ Bridge-Antwort muss ein JSON-Objekt sein.\n")
              raise SystemExit(1)

          status = str(data.get("status", ""))
          message = str(data.get("message", ""))
          slug = str(data.get("slug", ""))
          run_id = str(data.get("runId", ""))
          commit_sha = str(data.get("commitSha", ""))

          if not status or not message:
              with summary.open("a", encoding="utf-8") as f:
                  f.write("❌ Pflichtfelder status/message fehlen.\n")
                  f.write("```json\n")
                  f.write(json.dumps(data, ensure_ascii=False, indent=2) + "\n")
                  f.write("```\n")
              raise SystemExit(1)

          with out.open("a", encoding="utf-8") as f:
              f.write(f"status={status}\n")
              f.write(f"message={message}\n")
              f.write(f"slug={slug}\n")
              f.write(f"run_id={run_id}\n")
              f.write(f"commit_sha={commit_sha}\n")

          with summary.open("a", encoding="utf-8") as f:
              f.write("## Hack Optimize Dispatch\n\n")
              f.write(f"✅ Bridge-Antwort gelesen\n\n- status: `{status}`\n- message: {message}\n")
              if slug:
                  f.write(f"- slug: `{slug}`\n")
              if run_id:
                  f.write(f"- runId: `{run_id}`\n")
              if commit_sha:
                  f.write(f"- commitSha: `{commit_sha}`\n")
          PY

      - name: Summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Trigger"
            echo "- Actor: \`${{ github.actor }}\`"
            echo "- Mode: \`${{ inputs.mode }}\`"
            echo "- Dry Run: \`${{ inputs.dry_run }}\`"
            echo "- Commit gewuenscht: \`${{ inputs.commit }}\`"
            echo
            echo "### Ergebnis"
            echo "- Status: \`${{ steps.dispatch.outputs.status }}\`"
            echo "- Nachricht: ${{ steps.dispatch.outputs.message }}"
            if [[ -n "${{ steps.dispatch.outputs.slug }}" ]]; then
              echo "- Ziel-Slug: \`${{ steps.dispatch.outputs.slug }}\`"
            fi
            if [[ -n "${{ steps.dispatch.outputs.run_id }}" ]]; then
              echo "- Automation-Run-ID: \`${{ steps.dispatch.outputs.run_id }}\`"
            fi
            if [[ -n "${{ steps.dispatch.outputs.commit_sha }}" ]]; then
              echo "- Commit: \`${{ steps.dispatch.outputs.commit_sha }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when bridge reports failure
        if: ${{ !contains(fromJson('["queued","started","ok"]'), steps.dispatch.outputs.status) }}
        run: |
          echo "Bridge meldet Fehlerstatus: ${{ steps.dispatch.outputs.status }}"
          exit 1

