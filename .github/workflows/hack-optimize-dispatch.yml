name: Hack Optimize Dispatch

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Quelle des Slugs"
        required: true
        default: "next"
        type: choice
        options:
          - next
          - slug
      slug:
        description: "Nur bei mode=slug: konkreter Hack-Slug (z. B. abruf-ueben)"
        required: false
        default: ""
        type: string
      commit:
        description: "Soll die Automation commit+push ausfuehren?"
        required: true
        default: true
        type: boolean
      dry_run:
        description: "Nur pruefen, nichts committen"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Preconditions
        shell: bash
        env:
          AUTOMATION_WEBHOOK_URL: ${{ secrets.AUTOMATION_WEBHOOK_URL }}
          AUTOMATION_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${AUTOMATION_WEBHOOK_URL:-}" ]]; then
            echo "AUTOMATION_WEBHOOK_URL fehlt als Repository-Secret."
            {
              echo "## Hack Optimize Dispatch"
              echo
              echo "❌ **Konfiguration fehlt:** \`AUTOMATION_WEBHOOK_URL\`"
              echo
              echo "Bitte unter **Repo Settings -> Secrets and variables -> Actions** setzen."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 2
          fi

          if [[ -z "${AUTOMATION_TOKEN:-}" ]]; then
            echo "AUTOMATION_TOKEN fehlt als Repository-Secret."
            {
              echo "## Hack Optimize Dispatch"
              echo
              echo "❌ **Konfiguration fehlt:** \`AUTOMATION_TOKEN\`"
              echo
              echo "Bitte unter **Repo Settings -> Secrets and variables -> Actions** setzen."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 2
          fi

      - name: Dispatch to automation bridge
        id: dispatch
        shell: bash
        env:
          AUTOMATION_WEBHOOK_URL: ${{ secrets.AUTOMATION_WEBHOOK_URL }}
          AUTOMATION_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_SLUG: ${{ inputs.slug }}
          INPUT_COMMIT: ${{ inputs.commit }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          TRIGGERED_BY: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          payload=$(python - <<'PY'
import json, os
data = {
  "repo": os.environ["REPO"],
  "branch": os.environ["BRANCH"],
  "triggeredBy": os.environ["TRIGGERED_BY"],
  "runUrl": os.environ["RUN_URL"],
  "mode": os.environ["INPUT_MODE"],
  "slug": os.environ["INPUT_SLUG"],
  "commit": os.environ["INPUT_COMMIT"] == "true",
  "dryRun": os.environ["INPUT_DRY_RUN"] == "true"
}
print(json.dumps(data, separators=(",", ":")))
PY
)

          echo "Dispatch payload: ${payload}"

          # Kurze Timeouts, damit der Job bei DNS/Netzwerk nicht ewig hängt (Mobile-UI wirkt sonst "leer")
          http_status=$(curl -sS -o response.json -w "%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 2 \
            --retry-delay 1 \
            -X POST "${AUTOMATION_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -H "X-Automation-Token: ${AUTOMATION_TOKEN}" \
            --data "${payload}")

          echo "HTTP status: ${http_status}"

          if [[ "${http_status}" -lt 200 || "${http_status}" -ge 300 ]]; then
            echo "Bridge-Request fehlgeschlagen."
            echo "Antwort:"
            cat response.json || true
            {
              echo "## Hack Optimize Dispatch"
              echo
              echo "❌ **Dispatch fehlgeschlagen** (HTTP ${http_status})"
              echo
              echo '```json'
              cat response.json || true
              echo
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          python - <<'PY'
import json
import os
from pathlib import Path

summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
output_path = os.environ.get("GITHUB_OUTPUT")

path = Path("response.json")
raw = path.read_text(encoding="utf-8", errors="replace").strip()

def write_summary(title: str, body: str) -> None:
    if not summary_path:
        return
    with open(summary_path, "a", encoding="utf-8") as handle:
        handle.write(title + "\n\n")
        handle.write(body + "\n")

def fail(message: str) -> None:
    preview = raw[:1200].replace("\r", " ") if raw else ""
    write_summary(
        "## Hack Optimize Dispatch",
        "❌ **Bridge-Antwort ungueltig**\n\n"
        + message
        + "\n\n```text\n"
        + preview
        + "\n```\n",
    )
    raise SystemExit(1)

if not raw:
    fail("Leere Antwort vom Bridge-Endpoint.")

try:
    data = json.loads(raw)
except json.JSONDecodeError as exc:
    fail(f"Antwort ist kein gueltiges JSON ({exc}).")

if not isinstance(data, dict):
    fail("Antwort-JSON muss ein Objekt sein.")

for key in ("status", "message"):
    if key not in data:
        fail(f"Pflichtfeld fehlt: {key}")

status = str(data.get("status", ""))
message = str(data.get("message", ""))
slug = str(data.get("slug", ""))
run_id = str(data.get("runId", ""))
commit_sha = str(data.get("commitSha", ""))

if output_path:
    with open(output_path, "a", encoding="utf-8") as handle:
        handle.write(f"status={status}\n")
        handle.write(f"message={message}\n")
        handle.write(f"slug={slug}\n")
        handle.write(f"run_id={run_id}\n")
        handle.write(f"commit_sha={commit_sha}\n")

write_summary(
    "## Hack Optimize Dispatch",
    "✅ **Bridge-Antwort gelesen**\n\n"
    + f"- status: `{status}`\n"
    + f"- message: {message}\n"
    + (f"- slug: `{slug}`\n" if slug else "")
    + (f"- runId: `{run_id}`\n" if run_id else "")
    + (f"- commitSha: `{commit_sha}`\n" if commit_sha else ""),
)
PY

      - name: Summary
        shell: bash
        run: |
          set -euo pipefail
          status="${{ steps.dispatch.outputs.status }}"
          message="${{ steps.dispatch.outputs.message }}"
          slug="${{ steps.dispatch.outputs.slug }}"
          run_id="${{ steps.dispatch.outputs.run_id }}"
          commit_sha="${{ steps.dispatch.outputs.commit_sha }}"

          {
            echo "## Hack Optimize Dispatch"
            echo
            echo "- Trigger: \`${{ github.actor }}\`"
            echo "- Mode: \`${{ inputs.mode }}\`"
            echo "- Dry Run: \`${{ inputs.dry_run }}\`"
            echo "- Commit gewuenscht: \`${{ inputs.commit }}\`"
            echo
            if [[ "${status}" == "queued" || "${status}" == "started" || "${status}" == "ok" ]]; then
              echo "✅ **Bridge-Antwort:** ${message}"
            else
              echo "⚠️ **Bridge-Antwort:** ${message}"
            fi
            if [[ -n "${slug}" ]]; then
              echo "- Ziel-Slug: \`${slug}\`"
            fi
            if [[ -n "${run_id}" ]]; then
              echo "- Automation-Run-ID: \`${run_id}\`"
            fi
            if [[ -n "${commit_sha}" ]]; then
              echo "- Commit: \`${commit_sha}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job when bridge reports failure
        if: ${{ !contains(fromJson('["queued","started","ok"]'), steps.dispatch.outputs.status) }}
        run: |
          echo "Bridge meldet Fehlerstatus: ${{ steps.dispatch.outputs.status }}"
          exit 1
